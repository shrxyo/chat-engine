<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Engine</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #36393f;
      color: #dcddde;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #2f3136;
      padding: 12px 20px;
      border-bottom: 1px solid #202225;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      background: #40444b;
      padding: 10px 14px;
      border-radius: 6px;
      line-height: 1.4;
      word-break: break-word;
      max-width: 720px;
    }

    .message.mine {
      background: #5865f2;
      align-self: flex-end;
    }

    #input-area {
      display: flex;
      gap: 10px;
      padding: 16px 20px;
      background: #2f3136;
      border-top: 1px solid #202225;
    }

    #message-input {
      flex: 1;
      background: #40444b;
      border: none;
      border-radius: 6px;
      padding: 10px 14px;
      color: #dcddde;
      font-size: 15px;
      outline: none;
    }

    #message-input::placeholder {
      color: #72767d;
    }

    #send-btn {
      background: #5865f2;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #send-btn:hover {
      background: #4752c4;
    }

    #status {
      text-align: center;
      padding: 6px;
      font-size: 12px;
      color: #72767d;
    }

    #status.connected {
      color: #3ba55c;
    }

    #status.disconnected {
      color: #ed4245;
    }
  </style>
</head>
<body>
  <header># general</header>
  <div id="messages"></div>
  <div id="status" class="disconnected">Connecting…</div>
  <div id="input-area">
    <input
      id="message-input"
      type="text"
      placeholder="Message #general"
      autocomplete="off"
    />
    <button id="send-btn">Send</button>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("message-input");
    const sendBtn = document.getElementById("send-btn");
    const statusEl = document.getElementById("status");

    // Connect to the WebSocket server on the same host
    const wsUrl = `ws://${location.host}/ws`;
    let socket = new WebSocket(wsUrl);

    socket.addEventListener("open", () => {
      statusEl.textContent = "Connected";
      statusEl.className = "connected";
    });

    socket.addEventListener("close", () => {
      statusEl.textContent = "Disconnected — refresh to reconnect";
      statusEl.className = "disconnected";
    });

    socket.addEventListener("message", (event) => {
      appendMessage(event.data, /* mine = */ false);
    });

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || socket.readyState !== WebSocket.OPEN) return;

      // Show message immediately on sender's side
      appendMessage(text, /* mine = */ true);
      socket.send(text);
      inputEl.value = "";
    }

    function appendMessage(text, mine) {
      const div = document.createElement("div");
      div.className = "message" + (mine ? " mine" : "");
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    sendBtn.addEventListener("click", sendMessage);

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
