<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Engine</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #36393f;
      color: #dcddde;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #2f3136;
      padding: 12px 20px;
      border-bottom: 1px solid #202225;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      background: #40444b;
      padding: 10px 14px;
      border-radius: 6px;
      line-height: 1.4;
      word-break: break-word;
      max-width: 720px;
    }

    .message.mine {
      background: #5865f2;
      align-self: flex-end;
    }

    .message-author {
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .message.mine .message-author {
      color: #fff;
    }

    .message:not(.mine) .message-author {
      color: #00aff4;
    }

    .message-text {
      font-size: 15px;
      color: #dcddde;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #b9bbbe;
    }

    #toolbar button {
      background: transparent;
      border: none;
      color: #00aff4;
      cursor: pointer;
      font-size: 13px;
      padding: 0;
      text-decoration: underline;
    }

    #toolbar button:hover {
      color: #00b8f4;
    }

    #input-area {
      display: flex;
      gap: 10px;
      padding: 16px 20px;
      background: #2f3136;
      border-top: 1px solid #202225;
    }

    #message-input {
      flex: 1;
      background: #40444b;
      border: none;
      border-radius: 6px;
      padding: 10px 14px;
      color: #dcddde;
      font-size: 15px;
      outline: none;
    }

    #message-input::placeholder {
      color: #72767d;
    }

    #send-btn {
      background: #5865f2;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #send-btn:hover {
      background: #4752c4;
    }

    #status {
      text-align: center;
      padding: 6px;
      font-size: 12px;
      color: #72767d;
    }

    #status.connected {
      color: #3ba55c;
    }

    #status.disconnected {
      color: #ed4245;
    }
  </style>
</head>
<body>
  <header>
    <div># general</div>
    <div id="toolbar">
      <span>You: <strong id="username-label"></strong></span>
      <button type="button" id="rename-btn">Change name</button>
    </div>
  </header>
  <div id="messages"></div>
  <div id="status" class="disconnected">Connecting…</div>
  <div id="input-area">
    <input
      id="message-input"
      type="text"
      placeholder="Message #general"
      autocomplete="off"
    />
    <button id="send-btn">Send</button>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("message-input");
    const sendBtn = document.getElementById("send-btn");
    const statusEl = document.getElementById("status");
    const usernameLabel = document.getElementById("username-label");
    const renameBtn = document.getElementById("rename-btn");

    const STORAGE_KEY = "chat-username";

    function getOrSetUsername() {
      let name = localStorage.getItem(STORAGE_KEY);
      if (!name || !name.trim()) {
        name = window.prompt("Choose a display name", "Guest") || "Guest";
        name = name.trim() || "Guest";
        localStorage.setItem(STORAGE_KEY, name);
      }
      return name.trim();
    }

    let myUsername = getOrSetUsername();
    usernameLabel.textContent = myUsername;

    renameBtn.addEventListener("click", () => {
      const next =
        window.prompt("New display name", myUsername) || myUsername;
      myUsername = next.trim() || myUsername;
      localStorage.setItem(STORAGE_KEY, myUsername);
      usernameLabel.textContent = myUsername;
    });

    // Same host as the page: LAN IP, localhost, or a tunnel URL. Use wss when page is https.
    const wsProto = location.protocol === "https:" ? "wss:" : "ws:";
    const wsUrl = `${wsProto}//${location.host}/ws`;
    let socket = new WebSocket(wsUrl);

    socket.addEventListener("open", () => {
      statusEl.textContent = "Connected";
      statusEl.className = "connected";
    });

    socket.addEventListener("close", () => {
      statusEl.textContent = "Disconnected — refresh to reconnect";
      statusEl.className = "disconnected";
    });

    socket.addEventListener("message", (event) => {
      let data;
      try {
        data = JSON.parse(event.data);
      } catch {
        return;
      }
      if (!data || typeof data !== "object") return;

      if (data.type === "history" && Array.isArray(data.messages)) {
        for (const item of data.messages) {
          if (
            !item ||
            typeof item.username !== "string" ||
            typeof item.text !== "string"
          ) {
            continue;
          }
          const mine = item.username.trim() === myUsername.trim();
          appendMessage(item.username, item.text, mine);
        }
        return;
      }

      if (
        data.type === "chat" &&
        typeof data.username === "string" &&
        typeof data.text === "string"
      ) {
        const mine = data.username.trim() === myUsername.trim();
        appendMessage(data.username, data.text, mine);
      }
    });

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || socket.readyState !== WebSocket.OPEN) return;

      socket.send(
        JSON.stringify({ type: "chat", username: myUsername, text })
      );
      inputEl.value = "";
    }

    function appendMessage(username, text, mine) {
      const div = document.createElement("div");
      div.className = "message" + (mine ? " mine" : "");

      const author = document.createElement("div");
      author.className = "message-author";
      author.textContent = username;

      const body = document.createElement("div");
      body.className = "message-text";
      body.textContent = text;

      div.appendChild(author);
      div.appendChild(body);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    sendBtn.addEventListener("click", sendMessage);

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
